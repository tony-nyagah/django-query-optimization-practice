services:
  db:
    container_name: postgres_db
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: django_query_optimization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  web:
    container_name: django_web
    build: .
    command: >
      sh -c "uv run manage.py migrate &&
             uv run manage.py runserver 0.0.0.0:1759"
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "1759:1759"
    environment:
      POSTGRES_DB: django_query_optimization
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      UV_PROJECT_ENVIRONMENT: /venv
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
